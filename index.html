<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pediatric Emergency Procedures - Flashcards</title>
  <style>
    :root {
      --blue:   #1B3A6B;
      --teal:   #0A7E8C;
      --ltblue: #E8F4F8;
      --gray:   #F5F5F5;
      --white:  #FFFFFF;
      --text:   #1A1A1A;
      --muted:  #666;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    header .brand { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; opacity: 0.8; text-transform: uppercase; }
    header h1 { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; }
    header .subtitle { font-size: 0.9rem; opacity: 0.75; margin-top: 0.25rem; }

    /* Progress */
    #progress-info {
      display: flex; align-items: center; gap: 1rem;
      color: rgba(255,255,255,0.85); font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    #progress-bar-track {
      flex: 1; background: rgba(255,255,255,0.25);
      border-radius: 4px; height: 6px; max-width: 200px;
    }
    #progress-bar-fill {
      height: 100%; background: #fff;
      border-radius: 4px; transition: width 0.3s;
    }

    /* Card flip */
    .card-scene {
      width: 100%; max-width: 640px;
      perspective: 1200px;
      margin-bottom: 1.5rem;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%; min-height: 260px;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      transform-style: preserve-3d;
    }
    .card-scene.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute; width: 100%; min-height: 260px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      padding: 2rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    .card-front {
      background: var(--white);
      align-items: center; justify-content: center;
      text-align: center;
    }
    .card-back {
      background: var(--ltblue);
      transform: rotateY(180deg);
      align-items: flex-start; justify-content: flex-start;
    }
    .card-badge {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--ltblue); color: var(--teal);
      padding: 0.25rem 0.75rem; border-radius: 20px;
      margin-bottom: 1rem;
    }
    .card-back .card-badge { background: rgba(10,126,140,0.12); }
    .card-front .q-text {
      font-size: 1.15rem; font-weight: 600; color: var(--blue);
      line-height: 1.55;
    }
    .card-back .a-label {
      font-size: 0.75rem; font-weight: 700; color: var(--teal);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .card-back .a-text {
      font-size: 1rem; color: var(--text); line-height: 1.65;
    }
    .tap-hint {
      margin-top: auto;
      font-size: 0.75rem; color: var(--muted);
      align-self: center;
    }
    .card-back .tap-hint { color: var(--teal); opacity: 0.7; }

    /* Controls */
    .controls {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      justify-content: center; margin-bottom: 1rem;
    }
    .btn {
      padding: 0.65rem 1.4rem;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    .btn:hover { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.7); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.btn-primary { background: rgba(255,255,255,0.9); color: var(--blue); border-color: transparent; }
    .btn.btn-primary:hover { background: #fff; }

    /* Loading */
    #loading {
      color: rgba(255,255,255,0.8);
      font-size: 1rem; text-align: center;
      padding: 3rem;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">Uprising Test Prep</div>
  <h1>Pediatric Emergency Procedures</h1>
  <div class="subtitle">500 Clinical Flashcards</div>
</header>

<div id="progress-info">
  <span id="card-counter">Card 1 of 500</span>
  <div id="progress-bar-track"><div id="progress-bar-fill" style="width:0%"></div></div>
  <span id="ch-label">Ch 1</span>
</div>

<div id="loading">Loading flashcards...</div>

<div class="card-scene" id="card-scene" style="display:none" onclick="flipCard()">
  <div class="card-inner" id="card-inner">
    <div class="card-face card-front">
      <div class="card-badge" id="front-badge">Chapter 1</div>
      <div class="q-text" id="q-text"></div>
      <div class="tap-hint">Tap to reveal answer</div>
    </div>
    <div class="card-face card-back">
      <div class="card-badge" id="back-badge">Answer</div>
      <div class="a-label">Answer</div>
      <div class="a-text" id="a-text"></div>
      <div class="tap-hint">Tap to flip back</div>
    </div>
  </div>
</div>

<div class="controls" id="controls" style="display:none">
  <button class="btn" id="prev-btn" onclick="move(-1)" disabled>&#8592; Prev</button>
  <button class="btn btn-primary" onclick="shuffleCards()">&#10227; Shuffle</button>
  <button class="btn" id="next-btn" onclick="move(1)">Next &#8594;</button>
</div>

<script>
let cards   = [];
let current = 0;

async function init() {
  try {
    const res = await fetch('flashcards.json');
    if (!res.ok) throw new Error('Network error');
    cards = await res.json();
    document.getElementById('loading').style.display    = 'none';
    document.getElementById('card-scene').style.display = 'block';
    document.getElementById('controls').style.display   = 'flex';
    show();
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading flashcards. Please try refreshing.';
  }
}

function show() {
  const c = cards[current];
  const scene = document.getElementById('card-scene');
  scene.classList.remove('flipped');

  document.getElementById('q-text').textContent     = c.front;
  document.getElementById('a-text').textContent     = c.back;
  document.getElementById('front-badge').textContent = `Chapter ${c.chapter}`;
  document.getElementById('back-badge').textContent  = `Chapter ${c.chapter}`;
  document.getElementById('card-counter').textContent = `Card ${current+1} of ${cards.length}`;
  document.getElementById('ch-label').textContent     = `Ch ${c.chapter}`;
  document.getElementById('progress-bar-fill').style.width = `${((current+1)/cards.length*100).toFixed(1)}%`;

  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === cards.length - 1;
}

function flipCard() {
  document.getElementById('card-scene').classList.toggle('flipped');
}

function move(dir) {
  const next = current + dir;
  if (next < 0 || next >= cards.length) return;
  current = next;
  show();
}

function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0;
  show();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') move(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

init();
</script>
</body>
</html>
